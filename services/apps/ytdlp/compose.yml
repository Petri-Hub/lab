services:
  ytdlp:
    image: ghcr.io/marcopiovanello/yt-dlp-web-ui:latest
    container_name: ytdlp
    restart: unless-stopped
    ports:
      - ${YTDLP_PORT}:3033
    networks:
      - lab
    volumes:
      - ../../../storage/ytdlp/downloads:/downloads 
      - ../../../storage/ytdlp/config:/config
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 512M
          
networks:
  lab:
    name: lab
    external: true