services:
  ofelia:
    image: mcuadros/ofelia:latest
    container_name: ofelia
    restart: unless-stopped
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lab
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 32M

networks:
  lab:
    name: lab
    external: true