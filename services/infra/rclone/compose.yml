services:
  rclone:
    image: rclone/rclone:latest
    container_name: rclone
    restart: unless-stopped
    command: 'rcd --rc-addr 0.0.0.0:${RCLONE_RESTIC_PORT} --rc-no-auth'
    volumes:
      - ./configuration/rclone.conf:/config/rclone/rclone.conf:ro
      - ../../../storage/restic:/repos
    networks:
      - lab

networks:
  lab:
    name: lab
    external: true