services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    environment:
      - NGINX_DOZZLE_DOMAIN=${NGINX_DOZZLE_DOMAIN}
      - NGINX_DOZZLE_PORT=${NGINX_DOZZLE_PORT}
      - NGINX_YTDLP_DOMAIN=${NGINX_YTDLP_DOMAIN}
      - NGINX_YTDLP_PORT=${NGINX_YTDLP_PORT}
      - NGINX_KAMIYOMU_DOMAIN=${NGINX_KAMIYOMU_DOMAIN}
      - NGINX_KAMIYOMU_PORT=${NGINX_KAMIYOMU_PORT}
      - NGINX_KAVITA_DOMAIN=${NGINX_KAVITA_DOMAIN}
      - NGINX_KAVITA_PORT=${NGINX_KAVITA_PORT}
      - NGINX_BTOP_DOMAIN=${NGINX_BTOP_DOMAIN}
      - NGINX_BTOP_PORT=${NGINX_BTOP_PORT}
      - NGINX_UPSNAP_DOMAIN=${NGINX_UPSNAP_DOMAIN}
      - NGINX_UPSNAP_PORT=${NGINX_UPSNAP_PORT}
    volumes:
      - ./configuration/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
    networks:
      - lab
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M
          
networks:
  lab:
    name: lab
    external: true