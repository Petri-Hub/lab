services:
  filebrowser:
    image: filebrowser/filebrowser:s6
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "${FILEBROWSER_PORT}:80"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - filebrowser_data:/database
      - ./configuration/settings.json:/config/settings.json
      - ../../../:/srv

volumes:
  filebrowser_data: